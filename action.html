<script>

const videoTrack = document.getElementById("video-track")
const videos = videoTrack.querySelectorAll("video")

const vidPrev = document.getElementById("vid-prev")
const vidNext = document.getElementById("vid-next")
const muteBtn = document.getElementById("video-mute")

let vidIndex = 0
let muted = false

function playVideo(i){

videos.forEach(v=>{
v.pause()
v.currentTime = 0
})

const v = videos[i]

v.muted = muted
v.play()

}

function updateVideo(){

videoTrack.style.transform =
`translateX(-${vidIndex * 100}%)`

playVideo(vidIndex)

}

/* NEXT */
vidNext.onclick = ()=>{
vidIndex++
if(vidIndex >= videos.length) vidIndex = 0
updateVideo()
}

/* PREV */
vidPrev.onclick = ()=>{
vidIndex--
if(vidIndex < 0) vidIndex = videos.length-1
updateVideo()
}

/* AUTO NEXT */
videos.forEach(v=>{
v.addEventListener("ended",()=>{
vidIndex++
if(vidIndex >= videos.length) vidIndex = 0
updateVideo()
})
})

/* MUTE */
muteBtn.onclick = ()=>{

muted = !muted
videos[vidIndex].muted = muted

muteBtn.src = muted
? "/assets/unmute.png"
: "/assets/mute.png"

}

/* AUTOPLAY FIX */
updateVideo()

/* ================= IMAGE ================= */

const imgTrack = document.getElementById("image-track")
const imgPrev = document.getElementById("img-prev")
const imgNext = document.getElementById("img-next")

let imgs = [...imgTrack.children]

/* infinite clone */
imgTrack.appendChild(imgs[0].cloneNode(true))
imgTrack.insertBefore(imgs[imgs.length-1].cloneNode(true), imgs[0])

imgs = [...imgTrack.children]

let index = 1

function updateImages(){

const slider = document.getElementById("image-slider")

const sliderCenter = slider.offsetWidth / 2

const img = imgs[index]

const imgCenter =
img.offsetLeft + img.offsetWidth / 2

const offset = sliderCenter - imgCenter

imgTrack.style.transform = `translateX(${offset}px)`

imgs.forEach(i=>i.classList.remove("active"))
img.classList.add("active")

}

imgNext.onclick = ()=>{
index++
updateImages()

if(index === imgs.length-1){
setTimeout(()=>{
index = 1
imgTrack.style.transition="none"
updateImages()
requestAnimationFrame(()=>{
imgTrack.style.transition=".45s ease"
})
},450)
}
}

imgPrev.onclick = ()=>{
index--
updateImages()

if(index === 0){
setTimeout(()=>{
index = imgs.length-2
imgTrack.style.transition="none"
updateImages()
requestAnimationFrame(()=>{
imgTrack.style.transition=".45s ease"
})
},450)
}
}

window.addEventListener("load",updateImages)
window.addEventListener("resize",updateImages)

</script>
